name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: typecheck + unit + integration tests ───────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter shared-db exec prisma generate

      - name: Typecheck
        run: pnpm --filter engine-fms exec tsc --noEmit

      - name: Build
        run: pnpm --filter engine-fms build

      - name: Unit tests
        run: pnpm --filter engine-fms exec vitest run src/__tests__/unit

      - name: Integration tests
        run: pnpm --filter engine-fms exec vitest run src/__tests__/integration

  # ── Frontend: typecheck + build + lint ──────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3016/api

      - name: Lint
        run: npm run lint

  # ── Mobile: analyze + unit/widget tests ─────────────────────────────────────
  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: mobile/smrit-driver

      - name: Flutter analyze
        run: flutter analyze
        working-directory: mobile/smrit-driver

      - name: Flutter test (widget tests)
        run: flutter test
        working-directory: mobile/smrit-driver

  # ── E2E / Security / Golden-path (runs only on main / manual dispatch) ──────
  e2e:
    name: E2E + Security + Golden Path
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smrit_user
          POSTGRES_PASSWORD: smrit_dev_password_123
          POSTGRES_DB: smrit_fms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend deps
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Generate Prisma + migrate + seed
        run: |
          pnpm --filter shared-db exec prisma migrate deploy
          pnpm --filter shared-db exec prisma db seed
        working-directory: backend
        env:
          DATABASE_URL: postgresql://smrit_user:smrit_dev_password_123@localhost:5432/smrit_fms

      - name: Start API server
        run: nohup pnpm --filter engine-fms dev &
        working-directory: backend
        env:
          DATABASE_URL: postgresql://smrit_user:smrit_dev_password_123@localhost:5432/smrit_fms
          JWT_SECRET: ci_jwt_secret_at_least_32_chars_long_here
          TRACCAR_URL: http://localhost:8082
          TRACCAR_ADMIN_EMAIL: admin@smrit.et
          TRACCAR_ADMIN_PASSWORD: traccar_password
          CORS_ORIGIN: http://localhost:5173
          PORT: "3016"

      - name: Wait for API to be ready
        run: npx wait-on http://localhost:3016/health --timeout 30000

      - name: Smoke tests
        run: pnpm --filter engine-fms exec vitest run ../../tests/smoke --config vitest.config.ts
        working-directory: backend
        env:
          TEST_API_URL: http://localhost:3016

      - name: Golden-path test
        run: pnpm --filter engine-fms exec vitest run ../../tests/smoke/golden-path.test.ts --config vitest.config.ts
        working-directory: backend
        env:
          TEST_API_URL: http://localhost:3016

      - name: Security tests
        run: pnpm --filter engine-fms exec vitest run ../../tests/security --config vitest.config.ts
        working-directory: backend
        env:
          TEST_API_URL: http://localhost:3016
          JWT_SECRET: ci_jwt_secret_at_least_32_chars_long_here

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Install frontend deps + build
        run: npm ci && npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3016/api

      - name: Serve frontend
        run: nohup npx serve -s dist -l 5173 &
        working-directory: frontend

      - name: Wait for dashboard
        run: npx wait-on http://localhost:5173 --timeout 20000

      - name: Playwright e2e tests
        run: npx playwright test
        env:
          DASHBOARD_URL: http://localhost:5173
          ADMIN_EMAIL: admin@smrit.et
          ADMIN_PASS: smrit2026

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Maestro (manual only — requires emulator) ───────────────────────────────
  # To run locally:
  #   brew install maestro   # or follow https://maestro.mobile.dev/getting-started/installing-maestro
  #   maestro test mobile/smrit-driver/.maestro/login.yaml
  #   maestro test mobile/smrit-driver/.maestro/trip_flow.yaml
  #
  # This job is excluded from automatic CI because it requires an Android emulator.
  # Enable by adding the label 'run-maestro' to a PR.
