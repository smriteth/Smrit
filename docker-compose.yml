version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smrit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: smrit_fms
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smrit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smrit_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - smrit_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  traccar:
    image: traccar/traccar:6.4-alpine
    container_name: smrit_traccar
    restart: unless-stopped
    ports:
      - "5000-5150:5000-5150"
      - "5000-5150:5000-5150/udp"
    volumes:
      - ./traccar/conf/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_logs:/opt/traccar/logs
      - traccar_data:/opt/traccar/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smrit_network

  engine-fms:
    build:
      context: ./backend
      dockerfile: apps/engine-fms/Dockerfile
    container_name: smrit_engine_fms
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3016
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/smrit_fms
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TRACCAR_URL: http://traccar:8082
      TRACCAR_ADMIN_EMAIL: ${TRACCAR_ADMIN_EMAIL}
      TRACCAR_ADMIN_PASSWORD: ${TRACCAR_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smrit_network
    ports:
      - "3016:3016"

  nginx:
    image: nginx:alpine
    container_name: smrit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - engine-fms
    networks:
      - smrit_network

volumes:
  postgres_data:
  redis_data:
  traccar_logs:
  traccar_data:

networks:
  smrit_network:
    driver: bridge
