services:
  postgres:
    image: postgres:16-alpine
    container_name: smrit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: smrit_fms
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/generated/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smrit_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?set POSTGRES_USER} -d smrit_fms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: smrit_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - smrit_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?set REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  traccar:
    image: traccar/traccar:6.4-alpine
    container_name: smrit_traccar
    restart: unless-stopped
    expose:
      - "8082"
      - "5055"
    volumes:
      - ./traccar/conf/generated/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_logs:/opt/traccar/logs
      - traccar_data:/opt/traccar/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smrit_network

  engine-fms:
    build:
      context: ./backend
      dockerfile: apps/engine-fms/Dockerfile
    container_name: smrit_engine_fms
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3016
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/smrit_fms
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379
      TRACCAR_URL: http://traccar:8082
      TRACCAR_OSMAND_ENDPOINT: ${TRACCAR_OSMAND_ENDPOINT:?set TRACCAR_OSMAND_ENDPOINT}
      TRACCAR_ADMIN_EMAIL: ${TRACCAR_ADMIN_EMAIL:?set TRACCAR_ADMIN_EMAIL}
      TRACCAR_ADMIN_PASSWORD: ${TRACCAR_ADMIN_PASSWORD:?set TRACCAR_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smrit_network
    expose:
      - "3016"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3016/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: smrit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      engine-fms:
        condition: service_healthy
      traccar:
        condition: service_started
    networks:
      - smrit_network

volumes:
  postgres_data:
  redis_data:
  traccar_logs:
  traccar_data:

networks:
  smrit_network:
    driver: bridge
